databases:
  - name: hireiq-db
    databaseName: hireiq
    user: hireiq
    plan: free

services:
  # ── Backend API ───────────────────────────────────────────────────────────
  - type: web
    name: hireiq-api
    env: python
    plan: free
    buildCommand: pip install -r services/api/requirements.txt
    startCommand: python services/api/run.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hireiq-db
          property: connectionString
      - key: AGENT_SERVICE_URL
        value: https://hireiq-agents.onrender.com   # ← update after first deploy
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production

  # ── Agent Service ─────────────────────────────────────────────────────────
  - type: web
    name: hireiq-agents
    env: python
    plan: free
    buildCommand: pip install -r services/agents/requirements.txt
    startCommand: python services/agents/run.py
    envVars:
      - key: GROQ_API_KEY
        sync: false                                  # ← set in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ENVIRONMENT
        value: production

  # ── Frontend (static site) ────────────────────────────────────────────────
  - type: web
    name: hireiq-frontend
    env: static
    plan: free
    rootDir: services/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://hireiq-api.onrender.com       # ← update after first deploy
